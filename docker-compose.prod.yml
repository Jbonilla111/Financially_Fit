services:
  db:
    image: postgres:15-alpine
    container_name: financiallyfit-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - financiallyfit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - financiallyfit-internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financiallyfit-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AUTH_MODE: jwt
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALLOWED_ORIGINS: https://${APP_HOSTNAME}
      UVICORN_RELOAD: ""
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./frontend/src/data:/seed-data:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - web-routing
      - financiallyfit-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web-routing"
      - "traefik.http.routers.financiallyfit-api.rule=(Host(`${APP_HOSTNAME}`) || Host(`100.75.217.26`)) && (PathPrefix(`/users`) || PathPrefix(`/tools`) || PathPrefix(`/courses`) || PathPrefix(`/titles`) || PathPrefix(`/health`) || PathPrefix(`/healthz`))"
      - "traefik.http.routers.financiallyfit-api.entrypoints=web"
      - "traefik.http.routers.financiallyfit-api.priority=100"
      - "traefik.http.services.financiallyfit-api.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        REACT_APP_API_URL: ""
    container_name: financiallyfit-frontend
    restart: always
    environment:
      NODE_ENV: production
      REACT_APP_API_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - web-routing
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web-routing"
      - "traefik.http.routers.financiallyfit-web.rule=Host(`${APP_HOSTNAME}`) || Host(`100.75.217.26`)"
      - "traefik.http.routers.financiallyfit-web.entrypoints=web"
      - "traefik.http.routers.financiallyfit-web.priority=10"
      - "traefik.http.services.financiallyfit-web.loadbalancer.server.port=8080"

volumes:
  financiallyfit_postgres_data:

networks:
  web-routing:
    name: web-routing
    external: true
  financiallyfit-internal:
    name: financiallyfit-internal
    driver: bridge
