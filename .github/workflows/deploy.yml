name: Deploy FinanciallyFit

'on':
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-financiallyfit
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy on brain-server
    runs-on:
      - self-hosted
      - linux
      - brain-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Authentik provisioning dependencies
        run: python -m pip install --upgrade pip requests

      - name: Ensure Docker is available
        run: docker version

      - name: Validate required secrets
        env:
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_API_TOKEN: ${{ secrets.AUTHENTIK_API_TOKEN }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        run: |
          for key in AUTHENTIK_URL AUTHENTIK_API_TOKEN POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}"
              exit 1
            fi
          done

      - name: Provision Authentik app/group/policy
        env:
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_API_TOKEN: ${{ secrets.AUTHENTIK_API_TOKEN }}
          APP_NAME: financiallyfit
          APP_HOSTNAME: financiallyfit.brain-server.com
          APP_INTERNAL_HOST: http://financiallyfit-backend:8000
          AUTHENTIK_GROUP_NAME: financiallyfit-users
          AUTHENTIK_POLICY_NAME: financiallyfit-access-policy
        run: python setup_auth.py

      - name: Deploy stack
        env:
          APP_HOSTNAME: financiallyfit.brain-server.com
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: ./deploy.sh
